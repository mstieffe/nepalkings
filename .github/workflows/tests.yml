name: Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
      - copilot/**

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r server/requirements.txt
          pip install pytest pip-audit

      - name: Check Markdown links
        run: |
          python scripts/check_markdown_links.py

      - name: Run tests
        run: |
          pytest -q

      - name: Audit Python dependencies
        run: |
          pip-audit -r requirements.txt -r server/requirements.txt

  postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nepalkings_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nepalkings_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENVIRONMENT: test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/nepalkings_test
      AI_ENABLED: 'False'
      STARTUP_MAINTENANCE_ENABLED: 'False'
      BACKGROUND_SERVICES_ENABLED: 'False'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install server dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install pytest

      - name: Run PostgreSQL compatibility tests
        run: |
          pytest -q \
            tests/server/test_migration_runner.py \
            tests/server/test_ops.py \
            tests/server/test_security_hardening.py \
            tests/server/test_conquer_cleanup.py \
            tests/server/test_conquer_centralization.py \
            tests/server/test_conquer_tactics_hand.py \
            tests/server/test_multiworker_coordination.py \
            tests/test_sqlite_postgres_importer.py
