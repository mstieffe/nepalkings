name: Security Scans

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
      - copilot/**

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
