name: Deploy Web Client

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'nepal_kings/**'
      - 'pygbag.ini'
      - 'scripts/build_web.sh'
      - '.github/workflows/deploy-web.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install pygbag==0.9.3 Pillow

      - name: Build optimized web bundle
        # Stages the app, downscales + quantizes images for the web (source
        # art untouched), then runs pygbag. See scripts/build_web.sh.
        run: bash scripts/build_web.sh

      - name: Report and enforce bundle budgets
        run: |
          python scripts/report_web_bundle.py \
            build/web-staging/nepal_kings/build/web \
            --max-archive-mib 52 \
            --max-audio-mib 15 \
            --output web-bundle-report.json

      - name: Upload bundle report
        uses: actions/upload-artifact@v7
        with:
          name: web-bundle-report-${{ github.sha }}
          path: web-bundle-report.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web-staging/nepal_kings/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
