    // Browser-native audio avoids SDL's realtime callback starving when the
    // WebAssembly game frame is busy. Desktop builds continue to use Pygame.
    (function(){
        var AudioContextClass = window.AudioContext || window.webkitAudioContext;
        var context = null;
        var buffers = Object.create(null);
        var requests = Object.create(null);
        var currentMusic = null;
        var musicGeneration = 0;
        var audioSessionType = 'unavailable';
        var formatProbe = document.createElement('audio');
        var supportsOgg = false;

        try {

                'audio/ogg; codecs="vorbis"').replace(/^no$/, '');
        } catch (error) {}
        var preferredExtension = supportsOgg ? '.ogg' : '.mp3';

        function configureAudioSession(){
            try {
                if (navigator.audioSession) {
                    navigator.audioSession.type = 'playback';
                    audioSessionType = navigator.audioSession.type || 'playback';
                    return true;
                }
            } catch (error) {
                audioSessionType = 'error';
            }
            return false;
        }
        configureAudioSession();

        function clampVolume(value){
            value = Number(value);
            return isFinite(value) ? Math.max(0, Math.min(1, value)) : 0;
        }

        function createAudioContext(){
            if (!AudioContextClass) return null;
            try {
                return new AudioContextClass({latencyHint: 'playback'});
            } catch (error) {
                // Older WebKit accepts the constructor but not its options.
                try {
                    return new AudioContextClass();
                } catch (fallbackError) {
                    return null;
                }
            }
        }

        function resumeContext(ctx){
            if (!ctx || ctx.state === 'closed') return Promise.resolve(false);
            if (ctx.state === 'running') return Promise.resolve(true);
            try {
                return Promise.resolve(ctx.resume()).then(function(){
                    return ctx.state === 'running';
                }, function(){ return false; });
            } catch (error) {
                return Promise.resolve(false);
            }
        }

        function primeContext(ctx){
            try {
                var buffer = ctx.createBuffer(1, 1, ctx.sampleRate || 44100);
                var source = ctx.createBufferSource();
                source.buffer = buffer;
                source.connect(ctx.destination);
                source.start(0);
            } catch (error) {}
        }

        function audioContext(){
            if (!context) context = createAudioContext();
            if (context && context.state !== 'running'
                    && context.state !== 'closed') {
                resumeContext(context);
            }
            return context;
        }

        function validFilename(filename){
            return typeof filename === 'string'
                && /^[A-Za-z0-9_.-]+$/.test(filename);
        }

        function candidateFilenames(filename){
            var stem = filename.replace(/\.(?:ogg|mp3)$/i, '');
            var fallbackExtension = preferredExtension === '.ogg'
                ? '.mp3' : '.ogg';
            return [stem + preferredExtension, stem + fallbackExtension];
        }

        function decodeBuffer(ctx, data){
            // Callback arguments retain compatibility with older WebKit;
            // current browsers return a Promise from the same invocation.
            return new Promise(function(resolve, reject){
                var settled = false;
                function succeed(buffer){
                    if (settled) return;
                    settled = true;
                    resolve(buffer);
                }
                function fail(error){
                    if (settled) return;
                    settled = true;
                    reject(error || new Error('Audio decode failed'));
                }
                try {
                    var result = ctx.decodeAudioData(data, succeed, fail);
                    if (result && typeof result.then === 'function') {
                        result.then(succeed, fail);
                    }
                } catch (error) {
                    fail(error);
                }
            });
        }

        function loadCandidate(ctx, filenames, index){
            var candidate = filenames[index];
            var url = new URL(
                'audio/' + encodeURIComponent(candidate), document.baseURI);
            return fetch(url.toString(), {cache: 'force-cache'})
                .then(function(response){
                    if (!response.ok) throw new Error('Audio HTTP ' + response.status);
                    return response.arrayBuffer();
                })
                .then(function(data){ return decodeBuffer(ctx, data); })
                .catch(function(error){
                    if (index + 1 < filenames.length) {
                        return loadCandidate(ctx, filenames, index + 1);
                    }
                    throw error;
                });
        }

        function loadBuffer(filename){
            var ctx = audioContext();
            if (!ctx || !validFilename(filename)) {
                return Promise.reject(new Error('Web Audio unavailable'));
            }
            if (buffers[filename]) return Promise.resolve(buffers[filename]);
            if (requests[filename]) return requests[filename];

            requests[filename] = loadCandidate(
                ctx, candidateFilenames(filename), 0)
                .then(function(buffer){
                    buffers[filename] = buffer;
                    delete requests[filename];
                    return buffer;
                })
                .catch(function(error){
                    delete requests[filename];
                    throw error;
                });
            return requests[filename];
        }

        function reportError(filename, error){
            console.warn('Nepal Kings audio failed:', filename, error);
        }

        window.nk_audio_unlock = function(){
            configureAudioSession();
            var ctx = audioContext();
            if (!ctx) return Promise.resolve(false);
            // Starting a source and resuming synchronously within the tap
            // covers both WebKit and Chromium's mobile autoplay policies.
            primeContext(ctx);
            return resumeContext(ctx).then(function(running){
                if (!running) return false;
                // Warm the first screen's theme while Python finishes booting.
                loadBuffer('music_menu.ogg').catch(function(error){
                    reportError('music_menu.ogg', error);
                });
                return true;
            });
        };

        window.nk_audio_play_sfx = function(filename, volume){
            var ctx = audioContext();
            if (!ctx || !validFilename(filename)) return false;
            loadBuffer(filename).then(function(buffer){
                var source = ctx.createBufferSource();
                var gain = ctx.createGain();
                source.buffer = buffer;
                gain.gain.value = clampVolume(volume);
                source.connect(gain);
                gain.connect(ctx.destination);
                source.start();
            }).catch(function(error){ reportError(filename, error); });
            return true;
        };

        window.nk_audio_play_music = function(filename, volume, fadeMs){
            var ctx = audioContext();
            if (!ctx || !validFilename(filename)) return false;
            var targetVolume = clampVolume(volume);
            var fadeSeconds = Math.max(0, Number(fadeMs) || 0) / 1000;

            if (currentMusic && currentMusic.filename === filename) {
                currentMusic.gain.gain.cancelScheduledValues(ctx.currentTime);
                currentMusic.gain.gain.setValueAtTime(
                    currentMusic.gain.gain.value, ctx.currentTime);
                currentMusic.gain.gain.linearRampToValueAtTime(
                    targetVolume, ctx.currentTime + fadeSeconds);
                return true;
            }

            var generation = ++musicGeneration;
            loadBuffer(filename).then(function(buffer){
                if (generation !== musicGeneration) return;
                var now = ctx.currentTime;
                var previous = currentMusic;
                var source = ctx.createBufferSource();
                var gain = ctx.createGain();
                source.buffer = buffer;
                source.loop = true;
                gain.gain.setValueAtTime(fadeSeconds ? 0 : targetVolume, now);
                if (fadeSeconds) {
                    gain.gain.linearRampToValueAtTime(
                        targetVolume, now + fadeSeconds);
                }
                source.connect(gain);
                gain.connect(ctx.destination);
                source.start();
                currentMusic = {filename: filename, source: source, gain: gain};

                if (previous) {
                    previous.gain.gain.cancelScheduledValues(now);
                    previous.gain.gain.setValueAtTime(
                        previous.gain.gain.value, now);
                    previous.gain.gain.linearRampToValueAtTime(
                        0, now + fadeSeconds);
                    previous.source.stop(now + fadeSeconds + 0.05);
                }
            }).catch(function(error){ reportError(filename, error); });
            return true;
        };

        window.nk_audio_stop_music = function(fadeMs){
            var ctx = audioContext();
            if (!ctx) return false;
            musicGeneration += 1;
            if (!currentMusic) return true;
            var previous = currentMusic;
            var fadeSeconds = Math.max(0, Number(fadeMs) || 0) / 1000;
            currentMusic = null;
            previous.gain.gain.cancelScheduledValues(ctx.currentTime);
            previous.gain.gain.setValueAtTime(
                previous.gain.gain.value, ctx.currentTime);
            previous.gain.gain.linearRampToValueAtTime(
                0, ctx.currentTime + fadeSeconds);
            previous.source.stop(ctx.currentTime + fadeSeconds + 0.05);
            return true;
        };

            configureAudioSession();
            var ctx = audioContext();
            if (!ctx) return Promise.resolve(false);
            primeContext(ctx);
            return resumeContext(ctx);
        };

            return {
                contextState: context ? context.state : 'uninitialized',
                audioSessionType: audioSessionType,
                musicFilename: currentMusic ? currentMusic.filename : null,
                preferredExtension: preferredExtension,
                loaded: Object.keys(buffers),
                pending: Object.keys(requests)

            window.nk_audio_resume();

        });

            if (!document.hidden) resumeAfterInteraction();
        });

            catch (error) { canvas.focus(); }

            input.type = isPassword ? 'password' : 'text';

            var canvas = document.getElementById('canvas');
            if (!canvas || canvas.width <= 1 || canvas.height <= 1) return;

            record.input.style.top = (bounds.top + record.y * scaleY) + 'px';
            record.input.style.width = Math.max(1, record.w * scaleX) + 'px';
            record.input.style.height = Math.max(1, record.h * scaleY) + 'px';
            record.input.style.display = enabled ? 'block' : 'none';

        function layoutAll(){
            Object.keys(fields).forEach(function(label){
                layoutField(fields[label]);
            });
        }

        window.nk_keyboard_register = function(
                label, current, isPassword, maxLength, x, y, width, height){
            if (!layer) return false;
            label = String(label || 'text');
            if (fields[label]) fields[label].input.remove();

            var input = document.createElement('input');
            input.className = 'nk-canvas-input';
            input.id = 'nk-canvas-input-' + label.replace(/[^A-Za-z0-9_-]/g, '-');
            input.setAttribute('aria-label', label);
            var record = {
                label: label,
                input: input,
                x: Number(x) || 0,
                y: Number(y) || 0,
                w: Number(width) || 1,
                h: Number(height) || 1,
                active: false,
                done: false,
                dirty: false
            };
            configureInput(record, current, isPassword, maxLength);
            fields[label] = record;
            layer.appendChild(input);

            input.addEventListener('pointerdown', resumeAudio);
            input.addEventListener('focus', function(){
                record.active = true;
                record.done = false;
                record.dirty = true;
                resumeAudio();
            });
            input.addEventListener('input', function(){
                record.dirty = true;
                resumeAudio();
            });
            input.addEventListener('blur', function(){
                record.active = false;
                record.done = true;
                record.dirty = true;
                resumeAudio();
            });
            input.addEventListener('keydown', function(event){
                if (event.key !== 'Enter') return;
                event.preventDefault();
                input.blur();
                focusCanvas();
            });
            layoutField(record);
            return true;
        };

        window.nk_keyboard_focus = function(label, current, isPassword, maxLength){
            var record = fields[String(label)];
            if (!record || !enabled) return false;
            configureInput(record, current, isPassword, maxLength);
            resumeAudio();
            try { record.input.focus({preventScroll: true}); }
            catch (error) { record.input.focus(); }
            try {
                var end = record.input.value.length;
                record.input.setSelectionRange(end, end);
            } catch (error) {}
            return true;
        };

        window.nk_keyboard_poll = function(label){
            var record = fields[String(label)];
            if (!record || (!record.dirty && !record.active)) return null;
            var snapshot = {
                value: record.input.value,
                active: record.active,
                done: record.done
            };
            record.dirty = false;
            record.done = false;
            return snapshot;
        };

        window.nk_keyboard_set_enabled = function(value){
            enabled = !!value;
            Object.keys(fields).forEach(function(label){
                var input = fields[label].input;
                input.disabled = !enabled;
                if (!enabled && document.activeElement === input) input.blur();
            });
            layoutAll();
            return true;
        };

        window.nk_keyboard_clear = function(){
            Object.keys(fields).forEach(function(label){
                fields[label].input.remove();
            });
            fields = Object.create(null);
            return true;
        };

        window.addEventListener('resize', layoutAll);
        window.addEventListener('orientationchange', layoutAll);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', layoutAll);
            window.visualViewport.addEventListener('scroll', layoutAll);
        }
    })();

    window.nk_prepare_audio_gate = function(){
        var loader = document.getElementById('nk-loader');
        if (!loader || loader.dataset.audioGate) return;
        loader.dataset.audioGate = 'filling';

        var subtitle = loader.querySelector('.subtitle');
        var status = document.getElementById('nk-status');
        if (subtitle) subtitle.textContent = 'Ready to play';
        if (status) status.textContent = 'Finishing loading...';

        function armGate(){
            loader.dataset.audioGate = 'ready';
            loader.classList.add('audio-gate');
            loader.setAttribute('role', 'button');
            loader.setAttribute('tabindex', '0');
            if (status) status.textContent = 'Tap to start';
        }

        function markWaiting(){
            armGate();
        }

        function tryUnlock(ev){
            if (window.MM && window.MM.UME) return;
            if (loader.dataset.audioGate !== 'ready') return;
            loader.dataset.audioGate = 'starting';
            if (status) status.textContent = 'Starting game...';

            var nativeAttempt;
            try {
                var canvas = document.getElementById('canvas');
                if (canvas && canvas.focus) canvas.focus();
                if (window.MM && window.MM.focus_handler && ev && ev.type === 'click') {
                    window.MM.focus_handler(ev);
                }
                nativeAttempt = window.nk_audio_unlock
                    ? Promise.resolve(window.nk_audio_unlock())
                    : Promise.resolve(false);
            } catch(e) {
                nativeAttempt = Promise.resolve(false);
            }

            function legacyMediaUnlock(){
                try {
                    var url = new URL('audio/ui_click.mp3', document.baseURI);
                    var audio = new Audio(url.toString());
                    audio.preload = 'auto';
                    audio.volume = 0.001;
                    audio.setAttribute('playsinline', '');
                    var attempt = audio.play();
                    if (attempt && attempt.then) {
                        return attempt.then(function(){
                            audio.pause();
                            return true;
                        }, function(){ return false; });
                    }
                    return Promise.resolve(true);
                } catch(e) {
                    return Promise.resolve(false);
                }
            }

            // Invoke both mechanisms before leaving the gesture callback.
            // Mobile autoplay permission does not survive a Promise turn.
            var mediaAttempt = legacyMediaUnlock();
            Promise.all([nativeAttempt, mediaAttempt]).then(function(results){
                var unlocked = results[0] || results[1];
                if (!unlocked) {
                    markWaiting();
                    return;
                }
                if (window.MM) window.MM.UME = true;
            }).catch(markWaiting);
        }

        loader.addEventListener('click', tryUnlock);
        loader.addEventListener('keydown', function(ev){
            if (ev.key === 'Enter' || ev.key === ' ') tryUnlock(ev);
        });

        if (typeof window.nk_fill_before_audio_gate === 'function') {
            window.nk_fill_before_audio_gate(armGate);
        } else {
            var bar = document.getElementById('nk-bar');
            if (bar) bar.style.width = '100%';
            armGate();
        }
    };

    window.nk_finish_audio_gate = function(){
        var loader = document.getElementById('nk-loader');
        if (!loader) return;
        loader.classList.remove('audio-gate');
        loader.dataset.audioGate = 'starting';
        loader.removeAttribute('role');
        loader.removeAttribute('tabindex');
        var subtitle = loader.querySelector('.subtitle');
        var status = document.getElementById('nk-status');
        if (subtitle) subtitle.textContent = 'Loading game...';
        if (status) status.textContent = 'Starting game...';
    };

    // ── Unified loading-progress controller ──────────────
    (function(){
        var bar    = document.getElementById('nk-bar');
        var statEl = document.getElementById('nk-status');
        var prog   = document.getElementById('progress');
        var loader = document.getElementById('nk-loader');
        var canvas = document.getElementById('canvas');
        if (!bar || !loader) return;

        // Single owner of the bar so the real signals (pygbag's <progress>,
        // XHR byte progress, and the Python boot phase) can never fight each
        // other or drag the bar backwards.
        //   download phase : 0% .. 90%   (CDN runtime + nepal_kings bundle)
        //   python boot    : 90% .. 99%  (via window.nk_set_progress)
        //   ready          : -> 100% then fade out
        var shown = 0, target = 0;   // 0..1
        var pyReady = false;         // Python boot finished (nk_loader_done)
        var canvasUp = false;        // pygame canvas has a real size on screen
        var done = false;            // both true -> fill to 100% and fade
        var gateReadyCallback = null;
        var DL_CAP = 0.90;           // download phase ceiling
        var BOOT_CAP = 0.99;         // python-boot ceiling before "done"

        function cap(){
            if (done || loader.dataset.audioGate) return 1;
            return (pyReady || canvasUp) ? BOOT_CAP : DL_CAP;
        }

        // Hand off only after Python has shown its first frame and pygbag has
        // sized the canvas. A canvas resize alone can otherwise reveal a blank
        // surface between the loader and the login screen.
        function maybeFinish(){ if (pyReady && canvasUp) done = true; }

        function label(p){
            if (loader.dataset.audioGate === 'filling') return 'Finishing loading\u2026';
            if (loader.dataset.audioGate === 'ready') return 'Tap to start';
            if (loader.dataset.audioGate === 'starting') return 'Starting game\u2026';
            if (done || p > 0.965) return 'Starting game\u2026';
            if (canvasUp)          return 'Preparing game\u2026';
            if (p < 0.5)           return 'Downloading assets\u2026';
            return 'Preparing game engine\u2026';
        }

        // Raise the real target; never let it move backwards.
        function bump(p){ if (p > target) target = Math.min(p, cap()); }

        function tick(){
            var c = cap();
            // Asymptotic trickle so a stalled download still inches forward.
            if (target < c) target += (c - target) * 0.012;
            var goal = done ? 1 : target;
            shown += (goal - shown) * 0.14;
            if (done && goal - shown < 0.004) shown = 1;
            var armGate = null;
            if (gateReadyCallback && goal - shown < 0.004){
                shown = 1;
                target = 1;
                armGate = gateReadyCallback;
                gateReadyCallback = null;
            }
            bar.style.width = (Math.max(0, Math.min(1, shown)) * 100).toFixed(1) + '%';
            if (statEl) statEl.textContent = label(shown);
            if (armGate) armGate();
            if (done && shown >= 1){
                loader.style.transition = 'opacity .45s ease';
                loader.style.opacity = '0';
                setTimeout(function(){ loader.style.display = 'none'; }, 500);
                return;                       // stop animating
            }
            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        // Real signal #1: pygbag's hidden <progress> (runtime + bundle).
        if (prog){
            new MutationObserver(function(){
                var m = prog.max || 100;
                if (m) bump(prog.value / m * DL_CAP);
            }).observe(prog, {attributes: true});
        }

        // Real signal #2: XHR byte progress, folded into the same target
        // instead of writing the bar directly.
        var origSend = XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.send = function(){
            this.addEventListener('progress', function(e){
                if (e.lengthComputable && e.total) bump(e.loaded / e.total * DL_CAP);
            });
            return origSend.apply(this, arguments);
        };

        // Real signal #3: the Python boot phase (screen construction) maps
        // its own 0..1 into the 90%..99% band. See nepal_kings.py.
        window.nk_set_progress = function(frac){
            frac = Math.max(0, Math.min(1, +frac || 0));
            bump(DL_CAP + (BOOT_CAP - DL_CAP) * frac);
        };
        window.nk_fill_before_audio_gate = function(callback){
            gateReadyCallback = callback;
            target = 1;
        };
        window.nk_loader_done = function(){ pyReady = true; maybeFinish(); };

        // Readiness: the canvas only gets a real (>1px) size once pygame
        // actually paints to it, so this is the reliable hand-off signal —
        // the branded loader stays up through download + Python boot and
        // fades only when there's real game content underneath it.
        if (canvas){
            new MutationObserver(function(){
                if (parseInt(canvas.width) > 1 && parseInt(canvas.height) > 1){
                    canvasUp = true;
                    maybeFinish();
                }
            }).observe(canvas, {attributes: true, attributeFilter: ['width','height']});
        }
    })();

    // ── Lock to landscape on supporting browsers ─────────
    (function(){
        try {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(function(){});
            }
        } catch(e) {}
    })();

    </script>
