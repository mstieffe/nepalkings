import sys
import asyncio
import platform
import json
from pathlib import Path

# do not rename
async def custom_site():
    import embed
    platform.document.body.style.background = "#1e1c18"

    platform.window.transfer.hidden = true
    platform.window.canvas.style.visibility = "visible"


    bundle = "nepal_kings"

    # the C or js loader could do that but be explicit.
    appdir = Path(f"/data/data/{bundle}") # /data/data/nepal_kings
    appdir.mkdir()


    # unpack filesystem from compressed archive into work dir
    if platform.window.location.host.find('.itch.zone')>0:
        import zipfile
        async with platform.fopen("nepal_kings.apk", "rb") as archive:
            with zipfile.ZipFile(archive) as zip_ref:
                zip_ref.extractall(appdir.as_posix())
    else:
        import tarfile
        async with platform.fopen("nepal_kings.tar.gz", "rb") as archive:
            tar = tarfile.open(fileobj=archive, mode="r:gz")
            tar.extractall(path=appdir.as_posix(), filter='tar')
            tar.close()

    # preloader will change to work dir and prepend it to sys.path
    platform.run_main(PyConfig, loaderhome= appdir / "assets", loadermain=None)


    # wait preloading complete : that includes images and wasm compilation of bundled modules
    while embed.counter()<0:
        await asyncio.sleep(.1)

    main = appdir / "assets" / "main.py"

    # Mobile browsers require a real user gesture before audio can play.
    # Keep pygbag's UME gate active and let the branded loader collect
    # that tap instead of faking one.
    if not platform.window.MM.UME:
        __import__(__name__).__file__ = main
        while not platform.window.eval(
                "typeof window.nk_prepare_audio_gate === 'function'"):
            await asyncio.sleep(.05)
        platform.window.eval("window.nk_prepare_audio_gate()")
        while not platform.window.MM.UME:
            await asyncio.sleep(.05)
        platform.window.eval(
            "window.nk_finish_audio_gate && window.nk_finish_audio_gate()"
        )

    # start async top level machinery if not started and add a console in any case if requested.
    await TopLevel_async_handler.start_toplevel(platform.shell, console=window.python.config.debug)

    # now that apk is mounted we have access to font cache
    # but we need to fill __file__/__name__ that are not yet set
    __import__(__name__).__file__ = main


    def ui_callback(pkg):
        platform.window.infobox.innerText = f"installing {pkg}"

    await shell.source(main, callback=ui_callback)

    # if you don't reach that step
    # your main.py has an infinite sync loop somewhere !

    platform.window.infobox.style.display = "none"
    platform.window.config.gui_divider = 1
    platform.window.window_resize()
    print("default.tmpl: done")

    shell.interactive()

asyncio.run( custom_site() )

    <script type="application/javascript">

    globalThis.__canvas_resized = (self, ecw, ech) => {}

    window.nk_prepare_audio_gate = function(){
        var loader = document.getElementById('nk-loader');
        if (!loader || loader.dataset.audioGate === 'ready') return;
        loader.dataset.audioGate = 'ready';
        loader.classList.add('audio-gate');
        loader.setAttribute('role', 'button');
        loader.setAttribute('tabindex', '0');

        var subtitle = loader.querySelector('.subtitle');
        var status = document.getElementById('nk-status');
        if (subtitle) subtitle.textContent = 'Ready to play';
        if (status) status.textContent = 'Tap to start';

        function markWaiting(){
            loader.dataset.audioGate = 'ready';
            if (status) status.textContent = 'Tap to start';
        }

        function tryUnlock(ev){
            if (window.MM && window.MM.UME) return;
            if (loader.dataset.audioGate === 'starting') return;
            loader.dataset.audioGate = 'starting';
            if (status) status.textContent = 'Starting game...';

            try {
                var canvas = document.getElementById('canvas');
                if (canvas && canvas.focus) canvas.focus();
                if (window.MM && window.MM.focus_handler && ev && ev.type === 'click') {
                    window.MM.focus_handler(ev);
                }
            } catch(e) {}

            try {
                var cdn = (window.config && window.config.cdn)
                    || 'https://pygame-web.github.io/cdn/0.9.3/';
                var audio = new Audio(cdn + 'empty.ogg');
                audio.setAttribute('playsinline', '');
                var attempt = audio.play();
                if (attempt && attempt.then) {
                    attempt.then(function(){
                        if (window.MM) window.MM.UME = true;
                    }).catch(markWaiting);
                } else if (window.MM) {
                    window.MM.UME = true;
                }
            } catch(e) {
                markWaiting();
            }
        }

        loader.addEventListener('click', tryUnlock);
        loader.addEventListener('keydown', function(ev){
            if (ev.key === 'Enter' || ev.key === ' ') tryUnlock(ev);
        });
    };

    window.nk_finish_audio_gate = function(){
        var loader = document.getElementById('nk-loader');
        if (!loader) return;
        loader.classList.remove('audio-gate');
        loader.removeAttribute('role');
        loader.removeAttribute('tabindex');
        var subtitle = loader.querySelector('.subtitle');
        var status = document.getElementById('nk-status');
        if (subtitle) subtitle.textContent = 'Loading game...';
        if (status) status.textContent = 'Starting game...';
    };

    // ── Unified loading-progress controller ──────────────
    (function(){
        var bar    = document.getElementById('nk-bar');
        var statEl = document.getElementById('nk-status');
        var prog   = document.getElementById('progress');
        var loader = document.getElementById('nk-loader');
        var canvas = document.getElementById('canvas');
        if (!bar || !loader) return;

        // Single owner of the bar so the real signals (pygbag's <progress>,
        // XHR byte progress, and the Python boot phase) can never fight each
        // other or drag the bar backwards.
        //   download phase : 0% .. 90%   (CDN runtime + nepal_kings bundle)
        //   python boot    : 90% .. 99%  (via window.nk_set_progress)
        //   ready          : -> 100% then fade out
        var shown = 0, target = 0;   // 0..1
        var pyReady = false;         // Python boot finished (nk_loader_done)
        var canvasUp = false;        // pygame canvas has a real size on screen
        var done = false;            // both true -> fill to 100% and fade
        var DL_CAP = 0.90;           // download phase ceiling
        var BOOT_CAP = 0.99;         // python-boot ceiling before "done"

        function cap(){ return done ? 1 : ((pyReady || canvasUp) ? BOOT_CAP : DL_CAP); }

        // Hand off only after Python has shown its first frame and pygbag has
        // sized the canvas. A canvas resize alone can otherwise reveal a blank
        // surface between the loader and the login screen.
        function maybeFinish(){ if (pyReady && canvasUp) done = true; }

        function label(p){
            if (done || p > 0.965) return 'Starting game\u2026';
            if (canvasUp)          return 'Preparing game\u2026';
            if (p < 0.5)           return 'Downloading assets\u2026';
            return 'Preparing game engine\u2026';
        }

        // Raise the real target; never let it move backwards.
        function bump(p){ if (p > target) target = Math.min(p, cap()); }

        function tick(){
            var c = cap();
            // Asymptotic trickle so a stalled download still inches forward.
            if (target < c) target += (c - target) * 0.012;
            var goal = done ? 1 : target;
            shown += (goal - shown) * 0.14;
            if (done && goal - shown < 0.004) shown = 1;
            bar.style.width = (Math.max(0, Math.min(1, shown)) * 100).toFixed(1) + '%';
            if (statEl) statEl.textContent = label(shown);
            if (done && shown >= 1){
                loader.style.transition = 'opacity .45s ease';
                loader.style.opacity = '0';
                setTimeout(function(){ loader.style.display = 'none'; }, 500);
                return;                       // stop animating
            }
            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        // Real signal #1: pygbag's hidden <progress> (runtime + bundle).
        if (prog){
            new MutationObserver(function(){
                var m = prog.max || 100;
                if (m) bump(prog.value / m * DL_CAP);
            }).observe(prog, {attributes: true});
        }

        // Real signal #2: XHR byte progress, folded into the same target
        // instead of writing the bar directly.
        var origSend = XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.send = function(){
            this.addEventListener('progress', function(e){
                if (e.lengthComputable && e.total) bump(e.loaded / e.total * DL_CAP);
            });
            return origSend.apply(this, arguments);
        };

        // Real signal #3: the Python boot phase (screen construction) maps
        // its own 0..1 into the 90%..99% band. See nepal_kings.py.
        window.nk_set_progress = function(frac){
            frac = Math.max(0, Math.min(1, +frac || 0));
            bump(DL_CAP + (BOOT_CAP - DL_CAP) * frac);
        };
        window.nk_loader_done = function(){ pyReady = true; maybeFinish(); };

        // Readiness: the canvas only gets a real (>1px) size once pygame
        // actually paints to it, so this is the reliable hand-off signal —
        // the branded loader stays up through download + Python boot and
        // fades only when there's real game content underneath it.
        if (canvas){
            new MutationObserver(function(){
                if (parseInt(canvas.width) > 1 && parseInt(canvas.height) > 1){
                    canvasUp = true;
                    maybeFinish();
                }
            }).observe(canvas, {attributes: true, attributeFilter: ['width','height']});
        }
    })();

    // ── Lock to landscape on supporting browsers ─────────
    (function(){
        try {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(function(){});
            }
        } catch(e) {}
    })();
