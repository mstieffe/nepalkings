import sys
import asyncio
import platform
import json
from pathlib import Path

# do not rename
async def custom_site():
    import embed
    platform.document.body.style.background = "#1e1c18"

    platform.window.transfer.hidden = true
    platform.window.canvas.style.visibility = "visible"


    bundle = "nepal_kings"

    # the C or js loader could do that but be explicit.
    appdir = Path(f"/data/data/{bundle}") # /data/data/nepal_kings
    appdir.mkdir()


    # unpack filesystem from compressed archive into work dir
    if platform.window.location.host.find('.itch.zone')>0:
        import zipfile
        async with platform.fopen("nepal_kings.apk", "rb") as archive:
            with zipfile.ZipFile(archive) as zip_ref:
                zip_ref.extractall(appdir.as_posix())
    else:
        import tarfile
        async with platform.fopen("nepal_kings.tar.gz", "rb") as archive:
            tar = tarfile.open(fileobj=archive, mode="r:gz")
            tar.extractall(path=appdir.as_posix(), filter='tar')
            tar.close()

    # preloader will change to work dir and prepend it to sys.path
    platform.run_main(PyConfig, loaderhome= appdir / "assets", loadermain=None)


    # wait preloading complete : that includes images and wasm compilation of bundled modules
    while embed.counter()<0:
        await asyncio.sleep(.1)

    main = appdir / "assets" / "main.py"

    # Skip UME (user media engagement) wait — go straight to login.
    # If UME hasn't happened yet, simulate a click so the browser
    # unlocks audio context without blocking the user.
    if not platform.window.MM.UME:
        __import__(__name__).__file__ = main
        # Auto-trigger UME via a synthetic click on the canvas
        platform.window.eval("document.getElementById('canvas').click()")
        # Brief wait for the event to register
        for _i in range(20):
            if platform.window.MM.UME:
                break
            await asyncio.sleep(.05)

    # start async top level machinery if not started and add a console in any case if requested.
    await TopLevel_async_handler.start_toplevel(platform.shell, console=window.python.config.debug)

    # now that apk is mounted we have access to font cache
    # but we need to fill __file__/__name__ that are not yet set
    __import__(__name__).__file__ = main


    def ui_callback(pkg):
        platform.window.infobox.innerText = f"installing {pkg}"

    await shell.source(main, callback=ui_callback)

    # if you don't reach that step
    # your main.py has an infinite sync loop somewhere !

    platform.window.infobox.style.display = "none"
    platform.window.config.gui_divider = 1
    platform.window.window_resize()
    print("default.tmpl: done")

    shell.interactive()

asyncio.run( custom_site() )

    <script type="application/javascript">

    globalThis.__canvas_resized = (self, ecw, ech) => {}

    // ── Loading-bar progress hook ────────────────────────
    (function(){
        var bar = document.getElementById('nk-bar');
        var stat = document.getElementById('nk-status');
        var prog = document.getElementById('progress');
        // Watch the hidden pygbag <progress> element
        if (prog) {
            var obs = new MutationObserver(function(){
                var v = prog.value, m = prog.max || 100;
                var pct = Math.min(100, Math.round(v / m * 100));
                if (bar) bar.style.width = pct + '%';
                if (stat) {
                    if (pct < 30) stat.textContent = 'Downloading assets\u2026';
                    else if (pct < 80) stat.textContent = 'Preparing game engine\u2026';
                    else stat.textContent = 'Almost ready\u2026';
                }
            });
            obs.observe(prog, {attributes: true});
        }
        // Also hook XHR progress if pygbag fires it
        var origXHR = XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.send = function(){
            var x = this;
            x.addEventListener('progress', function(e){
                if (e.lengthComputable && bar) {
                    var pct = Math.round(e.loaded / e.total * 100);
                    bar.style.width = pct + '%';
                }
            });
            return origXHR.apply(this, arguments);
        };
    })();

    // Hide loader when canvas gets its first real resize
    (function(){
        var c = document.getElementById('canvas');
        var loader = document.getElementById('nk-loader');
        if (!c || !loader) return;
        var obs = new MutationObserver(function(){
            if (parseInt(c.width) > 1 && parseInt(c.height) > 1) {
                loader.style.opacity = '0';
                loader.style.transition = 'opacity .4s ease';
                setTimeout(function(){ loader.style.display = 'none'; }, 500);
                obs.disconnect();
            }
        });
        obs.observe(c, {attributes: true, attributeFilter: ['width','height']});
    })();

    // ── Lock to landscape on supporting browsers ─────────
    (function(){
        try {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(function(){});
            }
        } catch(e) {}
    })();

    }
